<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Synapse'26</title>

<link rel="icon" type="image/jpeg" href="./images/Logo.jpeg" />

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />

<link href="./src/output.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<style>
body {
  font-family: "Inter", sans-serif;
  background: radial-gradient(circle at 20% 20%, #0a0118, #0b0018, #05010d);
  color: #f3f4f6;
  overflow-x: hidden;
}

.glass {
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(10px);
  transition: all 0.4s ease;
  position: relative;
  overflow: hidden;
}

.glass:hover {
  transform: translateY(-6px);
  box-shadow: 0 0 25px rgba(186, 85, 211, 0.4);
}

.gradient-text {
  background: linear-gradient(90deg, #c084fc, #fb7185, #facc15);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.fade-in {
  opacity: 0;
  transform: translateY(20px);
  animation: fadeInUp 0.8s ease forwards;
}

@keyframes fadeInUp {
  to { opacity: 1; transform: translateY(0); }
}

#particles-js {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
}
</style>
</head>

<body>

<div id="particles-js"></div>

<!-- Navbar -->
<header class="fixed w-full top-0 z-50 backdrop-blur-lg bg-black/30 border-b border-white/10">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex justify-between items-center">

    <a href="index.html" class="flex items-center gap-3">
      <img src="./images/Logo.jpeg" class="h-10 w-10" />
      <span class="text-xl sm:text-2xl font-bold bg-gradient-to-r from-fuchsia-400 via-purple-400 to-pink-500 bg-clip-text text-transparent">
        Synapse'26
      </span>
    </a>

    <nav class="hidden md:flex gap-8 text-gray-300">
      <a href="#" class="hover:text-fuchsia-400">About</a>
      <a href="#" class="text-fuchsia-400 font-semibold">Competition</a>
      <a href="#" class="hover:text-fuchsia-400">Timeline</a>
    </nav>

    <div id="menu-btn" class="md:hidden cursor-pointer">
      <i class="fa-solid fa-bars text-white text-2xl"></i>
    </div>

  </div>

  <div id="mobile-menu" class="hidden flex-col absolute top-full left-0 w-full bg-black/80 text-center py-6">
    <a href="#" class="block py-2">About</a>
    <a href="#" class="block py-2 text-fuchsia-400">Competition</a>
    <a href="#" class="block py-2">Timeline</a>
  </div>
</header>

<!-- SECTION -->
<section class="pt-32 pb-20 px-4 text-center">

<h1 class="text-3xl sm:text-4xl font-extrabold gradient-text mb-4">
  COMPETITIONS
</h1>

<!-- ✅ INFO BOX FIXED -->
<div class="glass rounded-xl p-4 mx-auto max-w-xl flex items-center justify-center gap-3 text-sm sm:text-base mb-6 fade-in">
  <i class="fa-solid fa-circle-info text-fuchsia-400 text-lg sm:text-xl flex-shrink-0"></i>
  <p class="text-gray-300 text-left">
    Please read all the rules before completing the registration.
  </p>
</div>

<!-- Cards -->
<div class="grid sm:grid-cols-2 gap-6 max-w-6xl mx-auto">

  <div class="glass p-6 rounded-xl">
    <i class="fa-solid fa-code text-3xl text-fuchsia-400 mb-3"></i>
    <h3 class="text-lg font-bold">Code Craft</h3>
    <p class="text-gray-300 text-sm mt-2">Coding challenge event</p>
  </div>

  <div class="glass p-6 rounded-xl">
    <i class="fa-solid fa-bug text-3xl text-fuchsia-400 mb-3"></i>
    <h3 class="text-lg font-bold">Bug Buster</h3>
    <p class="text-gray-300 text-sm mt-2">Debugging competition</p>
  </div>

</div>

<!-- ✅ REGISTER BUTTON FIXED -->
<div class="mt-10 flex justify-center">
  <a href="#"
    class="w-full sm:w-auto text-center px-8 py-3 
    bg-gradient-to-r from-fuchsia-500 via-purple-500 to-pink-500 
    text-white text-base sm:text-lg font-semibold rounded-full 
    hover:scale-105 transition">
    Register Now →
  </a>
</div>

</section>

<!-- Footer -->
<footer class="text-center py-6 text-gray-400">
  © 2026 Synapse
</footer>

<script>
particlesJS("particles-js", {
  particles: {
    number: { value: 60 },
    color: { value: "#d946ef" },
    size: { value: 3 },
    move: { speed: 1 }
  }
});

const menuBtn = document.getElementById("menu-btn");
const mobileMenu = document.getElementById("mobile-menu");

menuBtn.addEventListener("click", () => {
  mobileMenu.classList.toggle("hidden");
});
</script>

</body>
</html>
